<!DOCTYPE html>
<html>
<head>
  <title>Email Rewriter</title>
</head>
<body>
  <h1>AI Email Rewriter</h1>

  <textarea id="input" rows="5" cols="40" placeholder="Enter your email..."></textarea>
  <br><br>

  <button onclick="rewriteEmail()">Rewrite</button>

  <h3>Output:</h3>
  <p id="output"></p>

  <script>
    async function rewriteEmail() {
      const input = document.getElementById("input").value;

      const res = await fetch("http://localhost:3000/rewrite", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ text: input }),
      });

      const data = await res.json();

      document.getElementById("output").innerText = data.output;
    }
  </script>
</body>
</html>
